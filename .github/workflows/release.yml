name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag（如 v0.2.0）"
        required: true
        type: string
      prerelease:
        description: "标记为 GitHub 预发布"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: changelog
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          chmod +x tools/generate_release_changelog.sh
          PREVIOUS=""
          if git rev-parse "${VERSION}^{commit}" >/dev/null 2>&1; then
            PREVIOUS=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || true)
          fi
          if [ -z "${PREVIOUS}" ]; then
            PREVIOUS=$(git tag -l 'v*' --sort=-version:refname | grep -Fxv "${VERSION}" | head -n1 || true)
          fi
          CHANGELOG=$(./tools/generate_release_changelog.sh "${PREVIOUS}" "${VERSION}" "${REPOSITORY}")
          {
            echo 'changelog<<EOF'
            echo "${CHANGELOG}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease }}
          body: |
            ## 更新内容

            ${{ steps.changelog.outputs.changelog }}

            ## Docker

            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pallas-bot-ai:${{ steps.get_version.outputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tagged-image:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: read

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/lib/jvm /usr/share/swift
          sudo apt-get clean
          docker system prune -af

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push tagged image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pallas-bot-ai:${{ needs.create-release.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pallas-bot-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
