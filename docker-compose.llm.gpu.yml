# GPU 覆盖层：为 Ollama 启用 NVIDIA runtime（需 container toolkit）
#   docker compose -f docker-compose.llm.yml -f docker-compose.llm.gpu.yml up -d

services:
  ollama:
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      # ollama list 只证明进程在跑；GPU 栈需 nvidia-smi 才能发现 NVML 断联
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 && nvidia-smi >/dev/null 2>&1"]
      interval: 5m
      timeout: 15s
      retries: 2
      start_period: 60s
