# LLM 最小栈：Redis + Ollama + Pallas-Bot-AI（无 Bot / 无 NapCat）
#
#   docker compose -f docker-compose.llm.yml up -d
#
# 默认不预拉模型；需要时：
#   docker compose -f docker-compose.llm.yml --profile pull-models up -d
# 首次请在 Bot WebUI「AI 配置 → 接入」选择/拉取模型。
#
# GPU 全功能镜像（CUDA）:
#   PALLAS_AI_IMAGE=pallasbot/pallas-bot-ai:latest \
#     docker compose -f docker-compose.llm.yml -f docker-compose.llm.gpu.yml up -d
#
# 仅远端 LLM（无 Ollama 容器）:
#   docker compose -f docker-compose.llm.yml up -d redis pallasbot-ai
#   # 并在环境变量设 LLM_PROVIDER_MODE=remote_only、LLM_REMOTE_*
#
# 与 Bot 容器互通（推荐，避免 host.docker.internal 回环超时）：
#   1) 本文件网络固定名为 pallas-ai（见底部 networks）
#   2) Bot compose 挂入该 external 网络，AI_SERVER_HOST=pallasbot-ai
#   3) 本侧 CALLBACK_HOST 改为 Bot 容器名（如 pallasbot），勿再用 host.docker.internal
# 示例片段：deploy/docker-compose.bot-join-ai.example.yml
#
# Bot 跑在宿主机（非容器）时：CALLBACK_HOST 可用 host.docker.internal / 127.0.0.1；
# Bot 侧 AI_SERVER_HOST 用 127.0.0.1 即可（经宿主机端口映射访问 9099）。

name: pallas-ai-llm

services:
  redis:
    image: redis:7-alpine
    container_name: pallas-ai-redis
    command: redis-server --appendonly yes
    networks:
      - pallas-ai
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    container_name: pallas-ai-ollama
    networks:
      - pallas-ai
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-init:
    profiles: ["pull-models"]
    image: ollama/ollama:latest
    container_name: pallas-ai-ollama-init
    networks:
      - pallas-ai
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${LLM_MODEL:-qwen2.5:7b}
      OLLAMA_CATEGORIZER_MODEL: ${LLM_CATEGORIZER_MODEL:-qwen2.5:0.5b}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until wget -q -O- http://ollama:11434/api/tags >/dev/null 2>&1; do sleep 2; done
        ollama pull "$${OLLAMA_MODEL:-qwen2.5:7b}"
        ollama pull "$${OLLAMA_CATEGORIZER_MODEL:-qwen2.5:0.5b}"
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  pallasbot-ai:
    image: ${PALLAS_AI_IMAGE:-pallasbot/pallas-bot-ai:slim}
    container_name: pallasbot-ai
    ports:
      - "${AI_SERVER_PORT:-9099}:9099"
    environment:
      TZ: Asia/Shanghai
      REDIS_URL: redis://redis:6379/0
      LLM_SESSION_BACKEND: redis
      # Bot 在宿主机：可保留 host.docker.internal；Bot 已挂入 pallas-ai 时改为容器名（如 pallasbot）
      CALLBACK_HOST: ${CALLBACK_HOST:-host.docker.internal}
      CALLBACK_PORT: ${CALLBACK_PORT:-8088}
      LLM_CHAT_ENABLED: "true"
      LLM_PROVIDER_MODE: ${LLM_PROVIDER_MODE:-local_only}
      LLM_BACKEND_URL: ${LLM_BACKEND_URL:-http://ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b}
      LLM_CATEGORIZER_MODEL: ${LLM_CATEGORIZER_MODEL:-qwen2.5:0.5b}
      LLM_AUTO_START: "false"
      CELERY_TASK_PACKAGES: llm
      AI_ENABLE_MEDIA_WORKER: "0"
    networks:
      - pallas-ai
    volumes:
      - ./logs:/server/logs
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
        required: false
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9099/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

networks:
  pallas-ai:
    # 固定名称，便于 Bot / 其它 compose 以 external 挂入
    name: pallas-ai
    driver: bridge
    attachable: true

volumes:
  redis_data:
  ollama_data:
